<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culture contre culture - SAEZ - Damien Saez</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .main-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 24px;
        }

        /* Ligne principale : image | colonne droite */
        .content-row {
            display: flex;
            align-items: stretch;
            gap: 48px;
            width: min(88vw, 1300px);
        }

        /* ---- IMAGE ---- */
        .main-image {
            display: block;
            flex: 0 0 auto;
            align-self: flex-start;
            width: 38%;
            height: auto;
            max-height: calc(100vh - 80px);
            border-radius: 6px;
            filter: drop-shadow(0 0 28px rgba(150, 0, 0, 0.2));
        }

        /* ---- COLONNE DROITE ---- */
        .right-col {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* centre video-group horizontalement */
        }

        /* ---- GROUPE vidéo + bouton : 84% de la colonne, centré ---- */
        .video-group {
            flex: 1;
            width: 84%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* ---- VIDÉO ---- */
        .video-wrap {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 28px rgba(140, 0, 0, 0.15);
        }

        .video-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ---- BOUTON ---- */
        .reserve-btn {
            display: block;
            cursor: pointer;
            opacity: 0.70;
            padding-top: 14px; /* espace minimum avec la vidéo */
            transition: opacity 0.3s ease, filter 0.3s ease;
        }

        .reserve-btn img {
            display: block;
            width: min(160px, 42vw);
            height: auto;
            border-radius: 4px;
        }

        .reserve-btn:hover {
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(160, 0, 0, 0.3));
        }

        /* ---- RESPONSIVE ---- */

        /* Tablette */
        @media (max-width: 768px) {
            .content-row {
                gap: 28px;
            }

            .main-image {
                width: min(42vw, 320px);
            }
        }

        /* Mobile : reset total → tout en block, plus de flex */
        @media (max-width: 560px) {
            .main-container {
                display: block;
                height: auto;
                min-height: 100vh;
                padding: 24px 16px;
            }

            .content-row {
                display: block;
                width: 100%;
            }

            .main-image {
                display: block;
                width: 88vw;
                max-width: 400px;
                max-height: none;
                margin: 0 auto;
            }

            .right-col {
                display: block;
                width: 100%;
                margin-top: 18px;
            }

            .video-group {
                display: block;
                width: 100%;
            }

            .video-wrap {
                width: 100%;
            }

            .reserve-btn {
                display: block;
                padding-top: 14px;
            }

            .reserve-btn img {
                display: block;
                margin: 0 auto;
                width: min(180px, 50vw);
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="content-row">

            <img class="main-image" src="300127.webp" alt="Les Maudits">

            <div class="right-col">
                <div class="video-group">
                    <!-- Remplacer VIDEO_ID par l'identifiant YouTube -->
                    <div class="video-wrap">
                        <iframe
                            src="https://www.youtube.com/embed/VIDEO_ID?rel=0&modestbranding=1&autoplay=0"
                            title="SAEZ – Le Concert du Siècle"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen>
                        </iframe>
                    </div>

                    <a href="https://billetterie.seetickets.fr/ext/billetterie5/?site=latourneedesmaudits" class="reserve-btn">
                        <img src="reserver.webp" alt="Réserver">
                    </a>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
