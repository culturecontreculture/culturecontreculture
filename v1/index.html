<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culture contre culture - SAEZ - Damien Saez</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            gap: 16px;
        }

        .main-image {
            display: block;
            max-width: min(88vw, 800px);
            width: auto;
            max-height: calc(100vh - 170px);
            height: auto;
            border-radius: 6px;
            filter: drop-shadow(0 0 30px rgba(160, 0, 0, 0.2));
        }

        .reserve-btn {
            display: block;
            cursor: pointer;
            flex-shrink: 0;
            opacity: 0.75;
            transition: opacity 0.3s ease, filter 0.3s ease;
        }

        .reserve-btn img {
            display: block;
            width: min(200px, 50vw);
            height: auto;
            border-radius: 4px;
        }

        .reserve-btn:hover {
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(160, 0, 0, 0.3));
        }
    </style>
</head>
<body>
    <div class="main-container">
        <img class="main-image" src="300127.webp" alt="Les Maudits">
        <a href="https://billetterie.seetickets.fr/ext/billetterie5/?site=latourneedesmaudits" class="reserve-btn">
            <img src="reserver.webp" alt="Réserver">
        </a>
    </div>
</body>
</html>
